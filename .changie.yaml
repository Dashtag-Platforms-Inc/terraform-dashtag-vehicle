changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## [{{.Version}}](https://github.com/Dashtag-Platforms-Inc/terraform-dashtag-vehicle/releases/tag/{{.Version}}) - {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '- {{.Body}}'
kinds:
  - label: Added
  - label: Changed
  - label: Deprecated
  - label: Removed
  - label: Fixed
  - label: Security
newlines:
  beforeChangelogVersion: 1
  endOfVersion: 1
  beforeKind: 1
  afterKind: 1
