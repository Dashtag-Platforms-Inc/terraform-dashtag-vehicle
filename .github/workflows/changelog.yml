name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  fragment:
    name: Require changelog fragment
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for an added fragment
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only --diff-filter=A "$BASE" "$HEAD" \
              | grep -qE '^\.changes/unreleased/.+\.ya?ml$'; then
            echo "✓ changelog fragment present"
          else
            echo "::error::No changelog fragment. Run 'changie new' (or add the 'skip-changelog' label for chore/docs-only PRs)."
            exit 1
          fi
